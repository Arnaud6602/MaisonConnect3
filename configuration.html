<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devis Express - MaisonConnecté 📝</title>
    <style>
        :root { --blue: #2c3e50; --navy: #34495e; --green: #27ae60; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.6; color: #333; margin: 0; background: #fff; }
        
        /* HEADER HARMONISÉ (STRICTEMENT IDENTIQUE SUR TOUTES LES PAGES) */
        header { background: var(--blue); color: white; padding: 2.5rem 1rem; text-align: center; box-sizing: border-box; min-height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center;}
        header h1 { margin: 0; font-size: 2.5rem; line-height: 1.1; }
        .slogan { margin: 10px 0 0 0; font-size: 1.1rem; opacity: 0.9; line-height: 1.4; }

        /* NAVIGATION HARMONISÉE */
        nav { background: var(--navy); padding: 12px; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        nav a { color: white; margin: 0 8px; text-decoration: none; font-weight: bold; font-size: 0.9rem; white-space: nowrap; }
        nav a:hover { color: var(--green); }

        .container { max-width: 600px; margin: auto; padding: 20px; box-sizing: border-box; }
        
        .card { 
            background: white; border: 2px solid var(--blue); border-radius: 15px; 
            padding: 25px; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--blue); }
        .input-group input { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box;
        }

        .result-box { 
            background: #e8f5e9; padding: 15px; border-radius: 10px; 
            text-align: center; margin: 20px 0; border: 2px solid var(--green);
        }
        .price { font-size: 2.2rem; font-weight: bold; color: var(--green); }
        
        .btn-submit { 
            display: block; width: 100%; background: var(--green); color: white; 
            padding: 15px; border: none; border-radius: 8px; font-size: 1.2rem; 
            font-weight: bold; cursor: pointer;
        }
        footer { text-align: center; padding: 2rem; background: #eee; margin-top: 40px; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

<header>
    <h1>✨ MaisonConnecté</h1>
    <p class="slogan">Expert Domotique à <strong>📍 Harnes, Lens et environs</strong></p>
</header>

<nav>
    <a href="index.html">🏠 Accueil</a>
    <a href="domotique.html">🚪 Volets</a>
    <a href="securite.html">🛡️ Sécurité</a>
    <a href="configuration.html">📝 Devis</a>
</nav>

<div class="container">
    <div style="text-align: center;">
        <h2>📊 Votre Devis Express</h2>
        <p>Ajustez les quantités et recevez votre estimation par mail. ⏱️</p>
    </div>

    <form action="https://formspree.io/f/maqdrndz" method="POST" class="card">
        
        <div class="input-group">
            <label>🦾 Nombre de Volets :</label>
            <input type="number" name="Volets" id="v" value="0" min="0" oninput="calc()">
        </div>

        <div class="input-group">
            <label>🚪 Capteurs d'ouverture :</label>
            <input type="number" name="Capteurs" id="c" value="0" min="0" oninput="calc()">
        </div>

        <div class="input-group">
            <label>📹 Caméras :</label>
            <input type="number" name="Cameras" id="cam" value="0" min="0" oninput="calc()">
        </div>

        <div class="result-box">
            <span>Estimation totale (Pose incluse) :</span>
            <div id="p-text" class="price">0 €</div>
            <input type="hidden" name="Total_Estime" id="h-price" value="0 €">
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <div class="input-group">
            <label>👤 Votre Nom complet :</label>
            <input type="text" name="Nom" required>
        </div>

        <div class="input-group">
            <label>📞 Téléphone :</label>
            <input type="tel" name="Telephone" required>
        </div>

        <div class="input-group">
            <label>📍 Ville :</label>
            <input type="text" name="Ville" required placeholder="Harnes, Lens...">
        </div>

        <button type="submit" class="btn-submit">📩 ENVOYER MA DEMANDE</button>
    </form>
</div>

<script>
function calc() {
    let volets = parseInt(document.getElementById('v').value) || 0;
    let capt = parseInt(document.getElementById('c').value) || 0;
    let cameras = parseInt(document.getElementById('cam').value) || 0;
    
    let total = 0;
    if (volets > 0) total += 89 + (volets - 1) * 79;
    if (capt > 0) total += 50 + (capt * 35);
    if (cameras > 0) total += cameras * 79;

    document.getElementById('p-text').innerText = total + " €";
    document.getElementById('h-price').value = total + " €";
}
</script>

<footer>
    <p>&copy; 2026 MaisonConnecté - Devis Gratuit 🛠️</p>
</footer>

</body>
</html>
